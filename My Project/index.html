<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <title>Vagnner Souza</title>
        <link rel="stylesheet" href="css/style-web.css" />
        <link rel="stylesheet" href="css/style-mobile.css" />
    </head>
    
    <body>

        <input type="checkbox" id="projetos-trigger">
        <input type="checkbox" id="hobbies-trigger">
        <input type="checkbox" id="sobre-trigger">

        <header class="header-box">
            <nav class="header-nav-box">
                
                <div class="nickname-box">
                <p class="nickname">Portfólio Pessoal</p>
                </div>

                <div class="click-box">
                <label class="header-click" for="projetos-trigger" href="#">Projetos</label>
                <label class="header-click" for="hobbies-trigger">Hobbies</label>
                <label class="header-click" for="sobre-trigger">Sobre</label>
                
                <nav class="menu-contato">
                <label class="contato-click">Contatos<img class="close" src="assets/img/down.png" alt="seta para baixo"><img class="open" src="assets/img/left.png" alt="seta para o lado"></label>
                <nav class="menu-box">
                <a class="menu-click" href="#"><p>Instagram</p><img class="menu-icon" src="assets/logo/instagram.png" alt="instagram logo"></a>
                <a class="menu-click" href="#"><p>Behance</p><img class="menu-icon" src="assets/logo/behance.png" alt="behance logo"></a>
                <a class="menu-click" href="#"><p>Whatsapp</p><img class="menu-icon" src="assets/logo/whatsapp.png" alt="Whatsapp logo"></a>
                </nav> 
                </div>   
                </nav>
            </nav>
        </header>

        <main class="main-box">
            <nav class="main-nav-left">
                <div class="nav-left-box">
                <img class="profile" src="assets/img/profile.png" alt="Imagem de perfil">
                <h1>Olá, Eu me chamo, Vagner.</h1>
                <h2>Designer Gráfico / Desenvolvedor Front-End Junior.</h2>
                <a class="work-click" href="#">Contratar</a>
                </div>
            </nav>
            <nav class="main-nav-right">
                <div class="avatar-box">
                <img class="avatar" src="assets/img/avatar.png" alt="imagem do avatar" src="#">
                </div>
            </nav>
        </main>

      <section class="overlay-projetos">

                <header class="header-projetos">
                <h2>Projetos</h2>
                <div class="projetos-close-box">
                <label class="close-projetos" for="projetos-trigger">X</label>
                </div>
                </header>

                <section class="img-box">
                <div class="cards-loop">
                <img class="loop-1" src="assets/img/avatar.png"alt="imagem do loop">
                <img class="loop-2" src="assets/img/profile.png" alt="imagem do loop">
                <img class="loop-3" src="assets/img/none.png" alt="imagem do loop">
                </div>

                <div class="cards-box">
                <a href="#"><p>Projeto-1</p><img class="cards" src="#" alt="imagem do projeto"></a>
                <a href="#"><p>Projeto-2</p><img class="cards" src="#" alt="imagem do projeto"></a>
                <a href="#"><p>Projeto-3</p><img class="cards" src="#" alt="imagem do projeto"></a>
                <a href="#"><p>Projeto-4</p><img class="cards" src="#" alt="imagem do projeto"></a>
                <a href="#"><p>Projeto-5</p><img class="cards" src="#" alt="imagem do projeto"></a>

                </div>
                </section>

        </section>

                        
        <section class="overlay-hobbies">

                <header class="header-hobbies">
                <h2>Hobbies</h2>
                <div class="hobbies-close-box">
                <label class="close-hobbies" for="hobbies-trigger">X</label>
                </div>
                </header>

                <div class="hobbies-cards-box" hidden>
                <a href="#"><p>Projeto-1</p><img class="hobbies-cards" src="#" alt="imagem do projeto"></a>
                <a href="#"><p>Projeto-2</p><img class="hobbies-cards" src="#" alt="imagem do projeto"></a>
                <a href="#"><p>Projeto-3</p><img class="hobbies-cards" src="#" alt="imagem do projeto"></a>
                </div>

        </section>

        <section class="overlay-sobre">

                <header class="header-sobre">
                <h2>Sobre</h2>
                <div class="sobre-close-box">
                <label class="close-sobre" for="sobre-trigger">X</label>
                </div>
                </header>

        </section>
        
    </body>
</html>
